name: Superloop

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: |
          python -m py_compile scripts/superloop_harness.py
          python -m py_compile src/superloop/cli.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Windows PowerShell smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:SUPERLOOP_STATE_HOME = Join-Path $env:RUNNER_TEMP "superloop-state"
          $env:SUPERLOOP_HOME = Join-Path $env:RUNNER_TEMP "superloop-home"
          .\scripts\superloop_cli.ps1 resume --workspace $PWD
          .\scripts\superloop_cli.ps1 doctor --host generic --source $PWD
          .\scripts\install.ps1 --host generic --source $PWD
          .\scripts\install.ps1 --host generic --source $PWD --check
